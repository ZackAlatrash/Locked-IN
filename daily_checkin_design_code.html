<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LockedIn | Daily Check-In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#313033",
                        "surface-container-high": "#2a2a2d",
                        "on-secondary-fixed": "#3a0b00",
                        "on-tertiary-fixed": "#1a0063",
                        "outline-variant": "#3b494b",
                        "tertiary-container": "#dcd4ff",
                        "secondary": "#ffb59e",
                        "surface-container": "#201f22",
                        "background": "#131316",
                        "primary": "#dbfcff",
                        "on-primary": "#00363a",
                        "on-error-container": "#ffdad6",
                        "on-surface": "#e5e1e5",
                        "secondary-fixed-dim": "#ffb59e",
                        "primary-fixed-dim": "#00dbe9",
                        "outline": "#849495",
                        "on-secondary-container": "#521300",
                        "tertiary-fixed-dim": "#c9bfff",
                        "error-container": "#93000a",
                        "inverse-primary": "#006970",
                        "surface-variant": "#353438",
                        "secondary-fixed": "#ffdbd0",
                        "surface-dim": "#131316",
                        "surface-container-lowest": "#0e0e11",
                        "tertiary": "#f9f4ff",
                        "on-primary-fixed-variant": "#004f54",
                        "inverse-surface": "#e5e1e5",
                        "on-primary-container": "#006970",
                        "on-surface-variant": "#b9cacb",
                        "on-background": "#e5e1e5",
                        "surface-bright": "#39393c",
                        "surface-container-highest": "#353438",
                        "surface-tint": "#00dbe9",
                        "primary-fixed": "#7df4ff",
                        "surface": "#131316",
                        "tertiary-fixed": "#e5deff",
                        "on-secondary": "#5e1700",
                        "on-secondary-fixed-variant": "#852400",
                        "on-tertiary-container": "#5d3fe0",
                        "error": "#ffb4ab",
                        "surface-container-low": "#1c1b1e",
                        "on-error": "#690005",
                        "secondary-container": "#ff571a",
                        "primary-container": "#00f0ff",
                        "on-primary-fixed": "#002022",
                        "on-tertiary": "#2e009c",
                        "on-tertiary-fixed-variant": "#441cc8"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-panel {
            background: rgba(32, 31, 34, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        .glow-overlay {
            background: radial-gradient(circle at center, rgba(0, 240, 255, 0.08) 0%, transparent 70%);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-surface-dim text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
    <!-- App Background Layer (Simulating Dashboard) -->
    <main class="fixed inset-0 z-0 flex flex-col p-6 opacity-40">
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary-container"
                    style="font-variation-settings: 'FILL' 1;">security</span>
                <span
                    class="font-headline font-bold tracking-tighter text-2xl uppercase text-primary-container">LockedIn</span>
            </div>
            <div
                class="w-10 h-10 rounded-full bg-surface-container-highest border border-outline-variant/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-on-surface-variant">person</span>
            </div>
        </header>
        <div class="grid grid-cols-2 gap-4">
            <div class="h-48 rounded-lg bg-surface-container-low border border-outline-variant/10"></div>
            <div class="h-48 rounded-lg bg-surface-container-low border border-outline-variant/10"></div>
            <div class="h-96 col-span-2 rounded-lg bg-surface-container-low border border-outline-variant/10"></div>
        </div>
    </main>
    <!-- Modal Backdrop Overlay -->
    <div class="fixed inset-0 z-[60] bg-surface-dim/80 backdrop-blur-sm flex items-center justify-center p-4">
        <!-- Daily Check-In Modal -->
        <div
            class="relative glass-panel w-full max-w-lg rounded-xl border border-outline-variant/20 shadow-[0_24px_80px_rgba(0,0,0,0.6)] overflow-hidden">
            <!-- Subtle internal glow -->
            <div class="absolute inset-0 glow-overlay pointer-events-none"></div>
            <!-- Modal Header -->
            <div class="relative px-8 pt-10 pb-6 text-center">
                <div
                    class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary-container/10 border border-primary-container/20 mb-6">
                    <span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span>
                    <span
                        class="font-label text-[10px] font-bold uppercase tracking-widest text-primary-container">SYSTEM
                        STATUS: STABLE</span>
                </div>
                <h1 class="font-headline text-4xl font-bold tracking-tight text-on-surface mb-2 uppercase">STABLE</h1>
                <p class="font-body text-on-surface-variant text-sm tracking-wide">3 clean days since last protocol
                    breach</p>
            </div>
            <!-- Protocol List Content -->
            <div class="relative px-8 pb-8 space-y-4">
                <!-- Protocol Item: Cold Plunge -->
                <div
                    class="group relative flex flex-col p-5 rounded-lg bg-surface-container-lowest border border-outline-variant/15 hover:border-primary-container/30 transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-1">
                            <h3 class="font-headline text-lg font-bold text-on-surface">Cold Plunge</h3>
                            <div class="flex items-center gap-2">
                                <span
                                    class="font-label text-[10px] text-on-surface-variant uppercase tracking-wider">Morning
                                    Resilience</span>
                                <span class="text-[10px] text-outline-variant">•</span>
                                <span
                                    class="font-label text-[10px] text-primary-container font-bold uppercase tracking-wider">ESSENTIAL</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button
                                class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-high border border-outline-variant/20 text-on-surface-variant hover:text-error hover:border-error/50 transition-colors">
                                <span class="material-symbols-outlined text-xl">close</span>
                            </button>
                        </div>
                    </div>
                    <button
                        class="w-full py-3 rounded-md bg-primary-container/5 border border-primary-container/20 font-label text-[11px] font-extrabold tracking-widest text-primary-container uppercase hover:bg-primary-container hover:text-on-primary transition-all duration-300">
                        COMPLETED
                    </button>
                </div>
                <!-- Protocol Item: No Sugar -->
                <div
                    class="group relative flex flex-col p-5 rounded-lg bg-surface-container-lowest border border-outline-variant/15 hover:border-secondary-container/30 transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-1">
                            <h3 class="font-headline text-lg font-bold text-on-surface">No Sugar</h3>
                            <div class="flex items-center gap-2">
                                <span
                                    class="font-label text-[10px] text-on-surface-variant uppercase tracking-wider">Metabolic
                                    Control</span>
                                <span class="text-[10px] text-outline-variant">•</span>
                                <span
                                    class="font-label text-[10px] text-secondary-container font-bold uppercase tracking-wider">HIGH
                                    STAKES</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button
                                class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-high border border-outline-variant/20 text-on-surface-variant hover:text-error hover:border-error/50 transition-colors">
                                <span class="material-symbols-outlined text-xl">close</span>
                            </button>
                        </div>
                    </div>
                    <button
                        class="w-full py-3 rounded-md bg-secondary-container/5 border border-secondary-container/20 font-label text-[11px] font-extrabold tracking-widest text-secondary-container uppercase hover:bg-secondary-container hover:text-on-secondary transition-all duration-300">
                        HOLDING FAST
                    </button>
                </div>
            </div>
            <!-- Footer Actions -->
            <div class="relative px-8 pb-10 flex flex-col gap-3">
                <button
                    class="w-full h-14 bg-primary-container text-on-primary font-headline font-bold tracking-widest uppercase rounded-lg shadow-[0_0_20px_rgba(0,240,255,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all">
                    COMMIT LOG
                </button>
                <button
                    class="w-full h-14 bg-transparent border border-outline-variant/30 text-on-surface-variant font-headline font-medium tracking-widest uppercase rounded-lg hover:bg-surface-container-highest transition-colors">
                    DEFER ANALYSIS
                </button>
            </div>
        </div>
    </div>
    <!-- Navigation Shell (Suppressed based on Task Context: Modal Focus) -->
    <!-- The Shell is hidden to prioritize the focused Check-In interaction -->
</body>

</html>
